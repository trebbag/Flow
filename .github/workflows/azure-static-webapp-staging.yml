name: Azure Static Web Apps Staging Deploy

on:
  workflow_dispatch:

concurrency:
  group: azure-static-webapp-staging
  cancel-in-progress: true

jobs:
  deploy-frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: staging
    env:
      VITE_API_BASE_URL: ${{ vars.STAGING_FRONTEND_API_BASE_URL }}
      VITE_DEFAULT_AUTH_MODE: microsoft
      VITE_ENABLE_DEV_HEADERS: "false"
      VITE_ENABLE_DEV_HEADER_LOGIN: "false"
      VITE_ENTRA_TENANT_ID: ${{ secrets.STAGING_ENTRA_TENANT_ID }}
      VITE_ENTRA_AUTHORITY: https://login.microsoftonline.com/${{ secrets.STAGING_ENTRA_TENANT_ID }}
      VITE_ENTRA_CLIENT_ID: ${{ secrets.STAGING_ENTRA_CLIENT_ID }}
      VITE_ENTRA_API_SCOPE: ${{ secrets.STAGING_ENTRA_API_SCOPE }}
      VITE_ENTRA_REDIRECT_PATH: /auth/callback
      VITE_ENTRA_POST_LOGOUT_REDIRECT_PATH: /login

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate deployment inputs
        run: |
          if [[ -z "${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}" ]]; then
            echo "Missing GitHub secret: AZURE_STATIC_WEB_APPS_API_TOKEN"
            exit 1
          fi

          if [[ -z "${VITE_API_BASE_URL}" ]]; then
            echo "Missing GitHub variable: STAGING_FRONTEND_API_BASE_URL"
            exit 1
          fi

          for secret_name in STAGING_ENTRA_TENANT_ID STAGING_ENTRA_CLIENT_ID STAGING_ENTRA_API_SCOPE; do
            value=""
            case "$secret_name" in
              STAGING_ENTRA_TENANT_ID) value="${VITE_ENTRA_TENANT_ID}" ;;
              STAGING_ENTRA_CLIENT_ID) value="${VITE_ENTRA_CLIENT_ID}" ;;
              STAGING_ENTRA_API_SCOPE) value="${VITE_ENTRA_API_SCOPE}" ;;
            esac
            if [[ -z "$value" ]]; then
              echo "Missing GitHub secret: $secret_name"
              exit 1
            fi
          done

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: "10"
      
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install frontend dependencies
        run: pnpm -C "docs/Flow Frontend" install --frozen-lockfile

      - name: Build frontend
        run: pnpm -C "docs/Flow Frontend" run build

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: docs/Flow Frontend/dist
          api_location: ""
          output_location: ""
          skip_app_build: true
