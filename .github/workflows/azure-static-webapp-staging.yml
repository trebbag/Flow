name: Azure Static Web Apps Staging Deploy

on:
  workflow_dispatch:

concurrency:
  group: azure-static-webapp-staging
  cancel-in-progress: true

jobs:
  deploy-frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: staging
    env:
      VITE_API_BASE_URL: ${{ vars.STAGING_FRONTEND_API_BASE_URL }}
      VITE_DEFAULT_AUTH_MODE: microsoft
      VITE_ENABLE_DEV_HEADERS: "false"
      VITE_ENABLE_DEV_HEADER_LOGIN: "false"
      # These are public app-registration identifiers, not secrets.
      # Prefer repo variables when present, but keep the current staging values as
      # safe fallbacks so workflow dispatch does not fail on empty secret slots.
      VITE_ENTRA_TENANT_ID: ${{ vars.STAGING_ENTRA_TENANT_ID || 'b9b1d566-d7ed-44a4-b3cc-cf8786d6a6ed' }}
      VITE_ENTRA_AUTHORITY: https://login.microsoftonline.com/${{ vars.STAGING_ENTRA_TENANT_ID || 'b9b1d566-d7ed-44a4-b3cc-cf8786d6a6ed' }}
      VITE_ENTRA_CLIENT_ID: ${{ vars.STAGING_ENTRA_CLIENT_ID || '020f7909-e66e-4ec8-810b-cfdf58e70014' }}
      VITE_ENTRA_API_SCOPE: ${{ vars.STAGING_ENTRA_API_SCOPE || 'api://89658fe4-9844-439a-97b0-ee31ace455da/access_as_user' }}
      VITE_ENTRA_REDIRECT_PATH: /auth/callback
      VITE_ENTRA_POST_LOGOUT_REDIRECT_PATH: /login

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate deployment inputs
        run: |
          if [[ -z "${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}" ]]; then
            echo "Missing GitHub secret: AZURE_STATIC_WEB_APPS_API_TOKEN"
            exit 1
          fi

          if [[ -z "${VITE_API_BASE_URL}" ]]; then
            echo "Missing GitHub variable: STAGING_FRONTEND_API_BASE_URL"
            exit 1
          fi

          for var_name in VITE_ENTRA_TENANT_ID VITE_ENTRA_CLIENT_ID VITE_ENTRA_API_SCOPE; do
            value="${!var_name}"
            if [[ -z "$value" ]]; then
              echo "Missing staging Entra config: $var_name"
              exit 1
            fi
          done

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: "10"
      
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install frontend dependencies
        run: pnpm -C "docs/Flow Frontend" install --frozen-lockfile

      - name: Build frontend
        run: pnpm -C "docs/Flow Frontend" run build

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: docs/Flow Frontend/dist
          api_location: ""
          output_location: ""
          skip_app_build: true
