name: Azure Static Web Apps Staging Deploy

on:
  workflow_dispatch:

concurrency:
  group: azure-static-webapp-staging
  cancel-in-progress: true

jobs:
  deploy-frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: staging
    env:
      VITE_API_BASE_URL: ${{ vars.STAGING_FRONTEND_API_BASE_URL }}
      VITE_DEFAULT_AUTH_MODE: microsoft
      VITE_ENABLE_DEV_HEADERS: "false"
      VITE_ENABLE_DEV_HEADER_LOGIN: "false"
      VITE_ENTRA_TENANT_ID: b9b1d566-d7ed-44a4-b3cc-cf8786d6a6ed
      VITE_ENTRA_AUTHORITY: https://login.microsoftonline.com/b9b1d566-d7ed-44a4-b3cc-cf8786d6a6ed
      VITE_ENTRA_CLIENT_ID: 020f7909-e66e-4ec8-810b-cfdf58e70014
      VITE_ENTRA_API_SCOPE: api://89658fe4-9844-439a-97b0-ee31ace455da/access_as_user
      VITE_ENTRA_REDIRECT_PATH: /login
      VITE_ENTRA_POST_LOGOUT_REDIRECT_PATH: /login

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate deployment inputs
        run: |
          if [[ -z "${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_ORANGE_BEACH_0851CDC0F }}" ]]; then
            echo "Missing GitHub secret: AZURE_STATIC_WEB_APPS_API_TOKEN_ORANGE_BEACH_0851CDC0F"
            exit 1
          fi

          if [[ -z "${VITE_API_BASE_URL}" ]]; then
            echo "Missing GitHub variable: STAGING_FRONTEND_API_BASE_URL"
            exit 1
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "10"

      - name: Install frontend dependencies
        run: pnpm -C "docs/Flow Frontend" install --frozen-lockfile

      - name: Build frontend
        run: pnpm -C "docs/Flow Frontend" run build

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_ORANGE_BEACH_0851CDC0F }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: docs/Flow Frontend/dist
          api_location: ""
          output_location: ""
          skip_app_build: true
