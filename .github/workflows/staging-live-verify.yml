name: Staging Frontend Live Verify

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  verify-staging:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: staging
    env:
      FRONTEND_API_BASE_URL: ${{ vars.STAGING_FRONTEND_API_BASE_URL }}
      STAGING_PROOF_USER_ID: ${{ secrets.STAGING_VITE_DEV_USER_ID }}
      STAGING_PROOF_ROLE: ${{ vars.STAGING_VITE_DEV_ROLE }}
      FRONTEND_E2E_PORT: ${{ vars.STAGING_FRONTEND_E2E_PORT }}
      AZURE_WEBAPP_NAME: ${{ vars.AZURE_WEBAPP_NAME }}
      AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
      AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: "10"

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Install backend dependencies
        run: pnpm install --frozen-lockfile

      - name: Install frontend dependencies
        run: pnpm -C "docs/Flow Frontend" install --frozen-lockfile

      - name: Install Playwright browser
        run: pnpm -C "docs/Flow Frontend" exec playwright install --with-deps chromium

      - name: Validate staging env
        run: |
          if [[ -z "${FRONTEND_API_BASE_URL}" ]]; then
            echo "Missing vars.STAGING_FRONTEND_API_BASE_URL"
            exit 1
          fi

          if [[ -z "${AZURE_CLIENT_ID}" || -z "${AZURE_TENANT_ID}" || -z "${AZURE_SUBSCRIPTION_ID}" || -z "${AZURE_WEBAPP_NAME}" ]]; then
            echo "Missing Azure OIDC workflow variables."
            exit 1
          fi

          if [[ -z "${STAGING_PROOF_USER_ID}" ]]; then
            echo "Missing secrets.STAGING_VITE_DEV_USER_ID for proof identity."
            exit 1
          fi

          RESOURCE_GROUP="${AZURE_RESOURCE_GROUP}"
          if [[ -z "${RESOURCE_GROUP}" ]]; then
            RESOURCE_GROUP="$(az webapp list \
              --query "[?name=='${AZURE_WEBAPP_NAME}'].resourceGroup | [0]" \
              -o tsv)"
          fi

          if [[ -z "${RESOURCE_GROUP}" ]]; then
            echo "Unable to determine Azure resource group for ${AZURE_WEBAPP_NAME}"
            exit 1
          fi

          AUTH_PROOF_HEADER_SECRET="$(az webapp config appsettings list \
            --name "${AZURE_WEBAPP_NAME}" \
            --resource-group "${RESOURCE_GROUP}" \
            --query "[?name=='AUTH_PROOF_HEADER_SECRET'].value | [0]" \
            -o tsv)"

          if [[ -z "${AUTH_PROOF_HEADER_SECRET}" ]]; then
            echo "AUTH_PROOF_HEADER_SECRET is not configured on ${AZURE_WEBAPP_NAME}"
            exit 1
          fi

          if [[ -z "${FRONTEND_E2E_PORT}" ]]; then
            echo "FRONTEND_E2E_PORT=4173" >> "$GITHUB_ENV"
          fi

          echo "::add-mask::${AUTH_PROOF_HEADER_SECRET}"
          {
            echo "VITE_PROOF_USER_ID=${STAGING_PROOF_USER_ID}"
            echo "FRONTEND_PROOF_USER_ID=${STAGING_PROOF_USER_ID}"
            echo "VITE_PROOF_ROLE=${STAGING_PROOF_ROLE:-Admin}"
            echo "FRONTEND_PROOF_ROLE=${STAGING_PROOF_ROLE:-Admin}"
            echo "VITE_PROOF_SECRET=${AUTH_PROOF_HEADER_SECRET}"
            echo "FRONTEND_PROOF_SECRET=${AUTH_PROOF_HEADER_SECRET}"
            echo "VITE_ENABLE_DEV_HEADERS=false"
            echo "VITE_ENABLE_DEV_HEADER_LOGIN=false"
          } >> "$GITHUB_ENV"

      - name: Frontend live verification (staging API)
        run: pnpm frontend:verify-live

      - name: Frontend bundle budgets
        run: pnpm -C "docs/Flow Frontend" run test:bundle-budget
