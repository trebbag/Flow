name: Azure App Service Staging Deploy

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency:
  group: azure-appservice-staging
  cancel-in-progress: true

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    environment: staging
    env:
      AZURE_WEBAPP_NAME: ${{ vars.AZURE_WEBAPP_NAME }}
      AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
      AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      PACKAGE_PATH: ./.azure/backend-package
      PACKAGE_ZIP_PATH: ./.azure/backend-package.zip
      DATABASE_URL: file:./prisma/dev.db

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate deployment inputs
        run: |
          if [[ -z "${AZURE_CLIENT_ID}" ]]; then
            echo "Missing GitHub variable: AZURE_CLIENT_ID"
            exit 1
          fi

          if [[ -z "${AZURE_TENANT_ID}" ]]; then
            echo "Missing GitHub variable: AZURE_TENANT_ID"
            exit 1
          fi

          if [[ -z "${AZURE_SUBSCRIPTION_ID}" ]]; then
            echo "Missing GitHub variable: AZURE_SUBSCRIPTION_ID"
            exit 1
          fi

          if [[ -z "${AZURE_WEBAPP_NAME}" ]]; then
            echo "Missing GitHub variable: AZURE_WEBAPP_NAME"
            exit 1
          fi

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: "10"

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Azure login (OIDC)
        uses: azure/login@v3
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Load staging database settings
        run: |
          RESOURCE_GROUP="${AZURE_RESOURCE_GROUP}"
          if [[ -z "${RESOURCE_GROUP}" ]]; then
            RESOURCE_GROUP="$(az webapp list \
              --query "[?name=='${AZURE_WEBAPP_NAME}'].resourceGroup | [0]" \
              -o tsv)"
          fi

          if [[ -z "${RESOURCE_GROUP}" ]]; then
            echo "Unable to determine Azure resource group for ${AZURE_WEBAPP_NAME}"
            exit 1
          fi

          POSTGRES_DATABASE_URL="$(az webapp config appsettings list \
            --name "${AZURE_WEBAPP_NAME}" \
            --resource-group "${RESOURCE_GROUP}" \
            --query "[?name=='POSTGRES_DATABASE_URL'].value | [0]" \
            -o tsv)"

          if [[ -z "${POSTGRES_DATABASE_URL}" ]]; then
            echo "POSTGRES_DATABASE_URL is not configured on ${AZURE_WEBAPP_NAME}"
            exit 1
          fi

          {
            echo "AZURE_RESOURCE_GROUP=${RESOURCE_GROUP}"
            echo "POSTGRES_DATABASE_URL=${POSTGRES_DATABASE_URL}"
          } >> "${GITHUB_ENV}"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Clients
        run: |
          pnpm db:generate
          pnpm db:generate:postgres

      - name: Apply PostgreSQL schema
        run: pnpm db:push:postgres

      - name: Build backend
        run: pnpm build

      - name: Prepare deployment package
        run: |
          rm -rf "${PACKAGE_PATH}"
          mkdir -p "${PACKAGE_PATH}"

          cp package.json "${PACKAGE_PATH}/"
          cp scripts/azure-startup.sh "${PACKAGE_PATH}/azure-startup.sh"
          cp -R dist "${PACKAGE_PATH}/dist"
          cp -R generated "${PACKAGE_PATH}/generated"
          cp -R prisma "${PACKAGE_PATH}/prisma"

          cd "${PACKAGE_PATH}"
          npm install --omit=dev --no-package-lock
          cd -

          PRISMA_CLIENT_DIR="$(node -e "const fs = require('fs'); const path = require('path'); const { createRequire } = require('module'); const req = createRequire(process.cwd() + '/'); const pkg = req.resolve('@prisma/client/package.json', { paths: [process.cwd()] }); process.stdout.write(fs.realpathSync(path.dirname(pkg)));")"
          GENERATED_PRISMA_DIR="$(node -e "const fs = require('fs'); const path = require('path'); const { createRequire } = require('module'); const req = createRequire(process.cwd() + '/'); const pkg = req.resolve('@prisma/client/package.json', { paths: [process.cwd()] }); const clientDir = fs.realpathSync(path.dirname(pkg)); process.stdout.write(path.resolve(clientDir, '..', '..', '.prisma'));")"

          if [[ ! -d "${PRISMA_CLIENT_DIR}" ]]; then
            echo "Resolved Prisma client directory not found: ${PRISMA_CLIENT_DIR}"
            exit 1
          fi

          if [[ ! -d "${GENERATED_PRISMA_DIR}" ]]; then
            echo "Resolved generated Prisma directory not found: ${GENERATED_PRISMA_DIR}"
            exit 1
          fi

          rm -rf "${PACKAGE_PATH}/node_modules/@prisma/client" "${PACKAGE_PATH}/node_modules/.prisma"
          mkdir -p "${PACKAGE_PATH}/node_modules/@prisma"
          cp -RL "${PRISMA_CLIENT_DIR}" "${PACKAGE_PATH}/node_modules/@prisma/client"
          cp -RL "${GENERATED_PRISMA_DIR}" "${PACKAGE_PATH}/node_modules/.prisma"

      - name: Create clean deployment zip
        run: |
          python3 scripts/create-clean-zip.py "${PACKAGE_PATH}" "${PACKAGE_ZIP_PATH}"

      - name: Deploy to Azure Web App
        run: |
          az webapp deploy \
            --name "${AZURE_WEBAPP_NAME}" \
            --resource-group "${AZURE_RESOURCE_GROUP}" \
            --src-path "${PACKAGE_ZIP_PATH}" \
            --type zip \
            --clean true \
            --restart true \
            --track-status false

      - name: Configure startup command
        run: |
          az webapp config set \
            --name "${AZURE_WEBAPP_NAME}" \
            --resource-group "${AZURE_RESOURCE_GROUP}" \
            --startup-file "bash /home/site/wwwroot/azure-startup.sh"
