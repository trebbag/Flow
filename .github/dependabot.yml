version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "backend"
    groups:
      prisma:
        patterns:
          - "@prisma/*"
          - "prisma"
      fastify:
        patterns:
          - "fastify"
          - "@fastify/*"
      typescript-tooling:
        patterns:
          - "typescript"
          - "tsx"
          - "eslint"
          - "eslint-*"
          - "@typescript-eslint/*"
          - "vitest"
          - "@types/*"
    ignore:
      # Major Node type bumps land with Node LTS upgrades; handle manually.
      - dependency-name: "@types/node"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "npm"
    directory: "/docs/Flow Frontend"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "frontend"
    groups:
      react:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"
      vite:
        patterns:
          - "vite"
          - "@vitejs/*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "ci"
